blueprint:
  name: "SunEnergyXT – Grid-Beneficial Charging & Discharging"
  description: >
    **Version 1.3.1**

    Controls the SunEnergyXT battery storage in a grid-beneficial way using
    two operating modes:

    **Active Charging (MM=0, GS negative):** Only when within the configured
    charge window, PV surplus is available, and the bell curve yields a target
    power > 0. Charging power follows the curve, adjusted by forecast, SOC,
    weather and EV priority.

    **PID Mode (MM=1, GS=0):** In all other situations – discharging on demand
    during the day, evening discharge, night, and after HA restart. The device's
    internal PID regulates to zero grid feed-in automatically.

    **Required:** Battery GS, IS, SC, MM entities
    **Optional:** SA/SI from device, Solar Forecast (up to 3), Weather,
    Wallbox/EV (up to 2 vehicles)
  domain: automation
  author: "SunEnergyXT Community"
  homeassistant:
    min_version: "2024.6.0"
  source_url: "https://github.com/ChristophCaina/SunEnergyXT-500-Series/blob/main/blueprints/automation/grid-beneficial-charging.yaml"

  input:

    # =========================================================================
    # SPEICHER – Pflichtfelder
    # =========================================================================
    section_battery:
      name: "🔋 Speicher"
      icon: mdi:battery-charging
      collapsed: false
      input:

        battery_soc_sensor:
          name: "Speicher SOC (Sensor)"
          description: >
            Aktueller Ladestand des Speichers in Prozent (API-Feld: SC).
            Zeigt nur Sensoren der SunEnergyXT-Integration.
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: sensor
                  device_class: battery                     

        battery_gs_number:
          name: "Grid Setpoint GS (Number)"
          description: >
            Steuert die Lade-/Entladeleistung. Negativ = Laden, Positiv = Entladen.
            API-Feld: GS. Zeigt nur Number-Entities der SunEnergyXT-Integration.
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: number
                  device_class: power                   

        battery_is_number:
          name: "Max. Inverterleistung IS (Number)"
          description: >
            Maximale Lade-/Entladeleistung in Watt (Hardware-Obergrenze).
            API-Feld: IS. Zeigt nur Number-Entities der SunEnergyXT-Integration.
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: number
                  device_class: power                   

        battery_mm_switch:
          name: "Self-Consumption Modus MM (Switch)"
          description: >
            Kern der Steuerung: MM=0 beim aktiven Laden (Blueprint übernimmt),
            MM=1 in allen anderen Situationen (PID des Geräts übernimmt).
            API-Feld: MM. Zeigt nur Switches der SunEnergyXT-Integration.
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: switch

    # =========================================================================
    # SPEICHER – SOC Grenzen (optional, direkt vom Gerät)
    # =========================================================================
    section_battery_limits:
      name: "🔋 Speicher – SOC Grenzen (optional)"
      icon: mdi:battery-arrow-up
      collapsed: true
      input:

        battery_sa_number:
          name: "Max. Charge SOC SA (Number, optional)"
          description: >
            Maximaler Ladestand in %. Wenn nicht gesetzt → 100%.
            API-Feld: SA. Nur SunEnergyXT Number-Entities.
          default:
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: number

        battery_si_number:
          name: "Min. Discharge SOC SI (Number, optional)"
          description: >
            Minimaler Entladestand in %. Wenn nicht gesetzt → 10%.
            API-Feld: SI. Nur SunEnergyXT Number-Entities.
          default:
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: number

        battery_bn_sensor:
          name: "Anzahl Batteriemodule BN (Sensor, optional)"
          description: >
            Anzahl der installierten Batteriemodule (Kopfeinheit + Erweiterungen).
            API-Feld: BN. Jedes Modul = 5 kWh Kapazität.
            Wird zur kapazitätsbasierten Berechnung der optimalen Ladeleistung
            und des Ladebeginns verwendet.
            Wenn nicht gesetzt → 1 Modul (5 kWh) als Fallback.
            Nur Sensoren der SunEnergyXT-Integration werden angezeigt.
          default:
          selector:
            entity:
              filter:
                - integration: sunenergyxt
                  domain: sensor

    # =========================================================================
    # PV & NETZ
    # =========================================================================
    section_pv:
      name: "☀️ PV & Netz"
      icon: mdi:solar-power
      collapsed: false
      input:

        pv_power_sensor:
          name: "PV Leistung aktuell (Sensor)"
          description: >
            Aktuelle PV-Erzeugungsleistung in Watt (positiv).
            z.B. sensor.solaredge_i1_ac_power
          selector:
            entity:
              filter:
                - device_class: power

        grid_power_sensor:
          name: "Netzanschluss – Leistung (Sensor)"
          description: >
            Aktuelle Leistung am Netzanschlusspunkt in Watt.
            Positiv = Einspeisung (Überschuss), Negativ = Bezug (Bedarf).
            Wird tagsüber genutzt um zu entscheiden ob aktives Laden oder
            PID-Entladung sinnvoller ist.
            z.B. sensor.solaredge_i1_m1_ac_power
          selector:
            entity:
              filter:
                - device_class: power

        house_base_load:
          name: "Grundlast Haus (Watt)"
          description: >
            Geschätzter Mindest-Hausverbrauch in Watt. Wird vom PV-Überschuss
            abgezogen bevor der Speicher aktiv lädt.
          default: 300
          selector:
            number:
              min: 0
              max: 2000
              step: 50
              unit_of_measurement: "W"

        min_surplus_to_charge:
          name: "Mindest-Überschuss zum aktiven Laden (Watt)"
          description: >
            Erst ab diesem Überschuss (nach Grundlast und E-Auto) schaltet
            der Blueprint in den aktiven Lademodus (MM=0). Liegt der Überschuss
            darunter, bleibt MM=1 – der PID regelt dann selbst.
          default: 100
          selector:
            number:
              min: 0
              max: 1000
              step: 50
              unit_of_measurement: "W"

        pv_start_threshold:
          name: "PV Mindestleistung für Standby-Modus (Watt)"
          description: >
            Sobald die PV-Anlage diese Leistung überschreitet, setzt der
            Blueprint MM=0 und GS=0 (Standby-Modus) – auch vor der
            konfigurierten Ladezeit. Das verhindert dass der interne PID
            unkontrolliert mit voller Leistung lädt bevor die Glockenkurve
            aktiv wird. Standard: 100W
          default: 100
          selector:
            number:
              min: 50
              max: 500
              step: 50
              unit_of_measurement: "W"

    # =========================================================================
    # SOLAR PROGNOSE (bis zu 3 Sensoren)
    # =========================================================================
    section_forecast:
      name: "📈 Solar-Prognose (optional)"
      icon: mdi:chart-bell-curve
      collapsed: true
      input:

        solar_forecast_sensor_1:
          name: "Solar-Prognose Sensor 1 (optional)"
          description: >
            Prognostizierter PV-Ertrag für heute in kWh.
            z.B. sensor.energy_production_today (Forecast.Solar)
            oder sensor.solcast_pv_forecast_forecast_today
          default:
          selector:
            entity: {}

        solar_forecast_sensor_2:
          name: "Solar-Prognose Sensor 2 (optional)"
          description: "Zweiter Forecast-Sensor (z.B. zweite Dachfläche). Wird addiert."
          default:
          selector:
            entity: {}

        solar_forecast_sensor_3:
          name: "Solar-Prognose Sensor 3 (optional)"
          description: "Dritter Forecast-Sensor. Wird ebenfalls addiert."
          default:
          selector:
            entity: {}

        forecast_good_threshold:
          name: "Schwellwert 'gute Prognose' (kWh)"
          description: >
            Ab diesem Tageswert gilt die Prognose als gut → Ladebeginn erst
            später (charge_start_hour_good). Darunter → früherer Start.
          default: 15
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "kWh"

        sun_duration_sensor:
          name: "Sonnenscheindauer Sensor (optional)"
          description: >
            Sensor mit stündlicher Sonnenscheindauer-Prognose im 'data'-Attribut
            (Wert in Sekunden, max. 3600 pro Stunde).
            Wird zur PV-Prognose genutzt wenn kein externer Forecast-Sensor
            konfiguriert ist (Priorität 2).
            Kompatibel mit allen Wetter-Integrationen die device_class: duration
            liefern (DWD, AccuWeather, Met.no, Open-Meteo, ...).
          default:
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: duration

        pv_peak_power_kw:
          name: "PV Anlagenleistung in kWp (optional)"
          description: >
            Nominale Peak-Leistung der PV-Anlage in Kilowatt-Peak.
            Wird zusammen mit dem Sonnenscheindauer-Sensor zur Prognose-
            berechnung genutzt. Nur relevant wenn sun_duration_sensor gesetzt.
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 0.5
              unit_of_measurement: "kWp"

        pv_system_efficiency:
          name: "PV Systemwirkungsgrad in % (optional)"
          description: >
            Gesamtwirkungsgrad der Anlage inkl. Wechselrichter, Leitungen und
            ggf. leichter Verschattung. Typisch: 75–85%.
            Standard: 80%
          default: 80
          selector:
            number:
              min: 50
              max: 100
              step: 5
              unit_of_measurement: "%"

    # =========================================================================
    # WETTER
    # =========================================================================
    section_weather:
      name: "🌤️ Wetter (optional)"
      icon: mdi:weather-partly-cloudy
      collapsed: true
      input:

        weather_entity:
          name: "Wetter Entity (optional)"
          description: "z.B. weather.forecast_home"
          default:
          selector:
            entity:
              filter:
                - domain: weather

        cloud_cover_sensor:
          name: "Bewölkung Sensor in % (optional)"
          description: >
            Direkter Sensor mit Bewölkungsgrad 0–100%. Hat Vorrang vor
            der Wetter-Entity.
          default:
          selector:
            entity: {}

    # =========================================================================
    # E-AUTO / WALLBOX
    # =========================================================================
    section_ev:
      name: "🚗 E-Auto & Wallbox (optional)"
      icon: mdi:car-electric
      collapsed: true
      input:

        wallbox_power_sensor:
          name: "Wallbox Ladeleistung (optional)"
          description: "Aktuelle Ladeleistung der Wallbox in Watt."
          default:
          selector:
            entity:
              filter:
                - device_class: power

        wallbox_soc_sensor:
          name: "Wallbox – Fahrzeug SOC (optional)"
          description: >
            SOC des angeschlossenen Fahrzeugs von der Wallbox.
            Hat Vorrang vor den einzelnen Fahrzeug-SOC-Sensoren.
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev1_charging_power_sensor:
          name: "Fahrzeug 1 – Ladeleistung (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: power

        ev1_soc_sensor:
          name: "Fahrzeug 1 – SOC (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev2_charging_power_sensor:
          name: "Fahrzeug 2 – Ladeleistung (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: power

        ev2_soc_sensor:
          name: "Fahrzeug 2 – SOC (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev_target_soc:
          name: "E-Auto Ziel-SOC (%)"
          description: >
            Ab diesem SOC gilt das E-Auto als ausreichend geladen –
            Speicher bekommt wieder volle Priorität.
          default: 80
          selector:
            number:
              min: 20
              max: 100
              step: 5
              unit_of_measurement: "%"

    # =========================================================================
    # LADEKURVE & TIMING
    # =========================================================================
    section_charge_curve:
      name: "⏱️ Ladekurve & Timing"
      icon: mdi:chart-bell-curve-cumulative
      collapsed: false
      input:

        charge_start_hour_good:
          name: "Aktives Laden: Beginn bei guter Prognose (Stunde)"
          description: >
            Früheste Zeit für aktives Laden (MM=0) wenn PV-Prognose gut ist.
            Außerhalb dieser Zeit: MM=1, PID regelt. Standard: 10 Uhr
          default: 10
          selector:
            number:
              min: 6
              max: 14
              step: 1
              unit_of_measurement: "h"

        charge_start_hour_poor:
          name: "Aktives Laden: Beginn bei schlechter Prognose (Stunde)"
          description: "Standard: 8 Uhr"
          default: 8
          selector:
            number:
              min: 6
              max: 12
              step: 1
              unit_of_measurement: "h"

        charge_peak_hour:
          name: "Ladekurven-Peak (Stunde)"
          description: "Tageszeit mit maximaler Ladeleistung. Standard: 13 Uhr"
          default: 13
          selector:
            number:
              min: 10
              max: 15
              step: 1
              unit_of_measurement: "h"

        charge_end_hour:
          name: "Aktives Laden: Ende (Stunde)"
          description: >
            Ab dieser Uhrzeit kein aktives Laden mehr (MM=0).
            Der PID übernimmt wieder. Standard: 17 Uhr
          default: 17
          selector:
            number:
              min: 14
              max: 20
              step: 1
              unit_of_measurement: "h"

        curve_aggressiveness:
          name: "Kurven-Aggressivität (1–5)"
          description: >
            1 = sanfter linearer Anstieg zum Peak.
            5 = schnell auf Maximum, lange auf Volllast.
          default: 3
          selector:
            number:
              min: 1
              max: 5
              step: 1

        soc_throttle_threshold:
          name: "SOC-Drosselungsschwelle (%)"
          description: >
            Ab diesem SOC wird die aktive Ladeleistung linear auf 0 gedrosselt.
            Unterhalb: volle Kurvenleistung. Standard: 80%
          default: 80
          selector:
            number:
              min: 50
              max: 95
              step: 5
              unit_of_measurement: "%"

        grid_trigger_threshold:
          name: "Grid-Trigger Schwellwert (Watt)"
          description: >
            Der Blueprint berechnet sofort neu wenn die Netzleistung diesen
            Wert über- oder unterschreitet – ohne auf den Timer zu warten.
            Oberhalb: Überschuss verfügbar → Laden starten/erhöhen.
            Unterhalb: Überschuss weg → Laden stoppen/reduzieren.
            Kleiner Wert = reaktiver (empfohlen für kleine Anlagen).
            Standard: 100W
          default: 100
          selector:
            number:
              min: 50
              max: 500
              step: 50
              unit_of_measurement: "W"

    # =========================================================================
    # NACHT-RESERVE
    # =========================================================================
    section_reserve:
      name: "🌙 Nacht-Reserve"
      icon: mdi:battery-lock
      collapsed: true
      input:

        discharge_reserve_soc:
          name: "Nacht-Reserve SOC (%)"
          description: >
            Der PID darf den Speicher nicht unter diesen SOC entladen.
            Wird durch den SI-Wert des Geräts ergänzt (der höhere Wert gilt).
            0 = nur Gerät-SI als Limit. Standard: 15%
          default: 15
          selector:
            number:
              min: 0
              max: 50
              step: 5
              unit_of_measurement: "%"

# =============================================================================
# VARIABLEN
# =============================================================================
variables:
  _soc_sensor:        !input battery_soc_sensor
  _gs_number:         !input battery_gs_number
  _is_number:         !input battery_is_number
  _mm_switch:         !input battery_mm_switch
  _sa_number:         !input battery_sa_number
  _si_number:         !input battery_si_number
  _pv_sensor:         !input pv_power_sensor
  _grid_sensor:       !input grid_power_sensor
  _base_load:         !input house_base_load
  _min_surplus:       !input min_surplus_to_charge
  _fc1:               !input solar_forecast_sensor_1
  _fc2:               !input solar_forecast_sensor_2
  _fc3:               !input solar_forecast_sensor_3
  _fc_good_thresh:    !input forecast_good_threshold
  _weather:           !input weather_entity
  _cloud_sensor:      !input cloud_cover_sensor
  _wb_power:          !input wallbox_power_sensor
  _wb_soc:            !input wallbox_soc_sensor
  _ev1_power:         !input ev1_charging_power_sensor
  _ev1_soc:           !input ev1_soc_sensor
  _ev2_power:         !input ev2_charging_power_sensor
  _ev2_soc:           !input ev2_soc_sensor
  _ev_target_soc:     !input ev_target_soc
  _start_good:        !input charge_start_hour_good
  _start_poor:        !input charge_start_hour_poor
  _peak_hour:         !input charge_peak_hour
  _end_hour:          !input charge_end_hour
  _aggressiveness:    !input curve_aggressiveness
  _soc_throttle:      !input soc_throttle_threshold
  _dis_reserve_soc:   !input discharge_reserve_soc
  _bn_sensor:         !input battery_bn_sensor
  _grid_trigger:      !input grid_trigger_threshold
  _pv_start_thresh:   !input pv_start_threshold
  _sun_duration:      !input sun_duration_sensor
  _pv_peak_kw:        !input pv_peak_power_kw
  _pv_efficiency:     !input pv_system_efficiency

# =============================================================================
# TRIGGER
# =============================================================================
trigger:
  # Regelmäßige Neuberechnung (Fallback / Maximalintervall)
  - platform: time_pattern
    minutes: "/2"

  # Ereignisbasiert: sofortige Reaktion auf Überschuss-Änderungen
  # Überschuss steigt über Schwellwert → Laden starten/erhöhen
  - platform: numeric_state
    entity_id: !input grid_power_sensor
    above: !input grid_trigger_threshold

  # Überschuss fällt unter Schwellwert → Laden stoppen/reduzieren
  - platform: numeric_state
    entity_id: !input grid_power_sensor
    below: !input grid_trigger_threshold

  # PV-Start: sobald Anlage produziert → Standby-Modus aktivieren
  - platform: numeric_state
    entity_id: !input pv_power_sensor
    above: !input pv_start_threshold

  # Phasenübergänge
  - platform: sun
    event: sunrise
    offset: "00:30:00"
  - platform: sun
    event: sunset

  # HA-Neustart → sicherer Zustand
  - platform: homeassistant
    event: start

# =============================================================================
# ACTION
# =============================================================================
action:
  # ---------------------------------------------------------------------------
  # SCHRITT 1: Alle Werte berechnen
  # ---------------------------------------------------------------------------
  - variables:
      current_hour: "{{ now().hour + now().minute / 60.0 }}"

      # SOC-Grenzen
      soc_max: >
        {% if _sa_number and states(_sa_number) not in ['unknown','unavailable'] %}
          {{ states(_sa_number) | float(100) }}
        {% else %}
          100
        {% endif %}
      soc_min: >
        {% if _si_number and states(_si_number) not in ['unknown','unavailable'] %}
          {{ states(_si_number) | float(10) }}
        {% else %}
          10
        {% endif %}
      soc_current:  "{{ states(_soc_sensor) | float(0) }}"

      # ------------------------------------------------------------------
      # KAPAZITÄT: BN × 5 kWh pro Modul
      # Bestimmt optimale Ladeleistung und kapazitätsbasierte Anpassungen
      # ------------------------------------------------------------------
      battery_modules: >
        {% if _bn_sensor and states(_bn_sensor) not in ['unknown','unavailable'] %}
          {{ states(_bn_sensor) | int(1) }}
        {% else %}
          1
        {% endif %}
      battery_capacity_kwh: "{{ battery_modules * 5.0 }}"

      # Ladezeit-Fenster in Stunden (Peak als Scheitelpunkt)
      charge_window_hours: "{{ [(_end_hour | float) - (_start_good | float), 1] | max }}"

      # Kapazitätsbasierte Mindest-Ladeleistung:
      # Wie viel W brauchen wir im Schnitt um den Speicher im Fenster zu füllen?
      # (nur informativer Richtwert – eigentliche Begrenzung via Kurve + Überschuss)
      capacity_based_min_power: >
        {% set empty_kwh = battery_capacity_kwh * (1 - soc_current / 100.0) %}
        {% set needed_w  = (empty_kwh * 1000.0) / charge_window_hours %}
        {{ needed_w | round(0) | int }}

      # Hardware-Limit
      is_max: "{{ states(_is_number) | float(800) }}"

      # PV & Netz
      pv_now:   "{{ states(_pv_sensor)   | float(0) }}"
      grid_now: "{{ states(_grid_sensor) | float(0) }}"
      # grid_now > 0 = Einspeisung (Überschuss), grid_now < 0 = Bezug (Bedarf)

      # E-Auto (Wallbox hat Vorrang)
      ev_power_total: >
        {% set wb = states(_wb_power)  | float(0) if _wb_power  else 0 %}
        {% set e1 = states(_ev1_power) | float(0) if _ev1_power else 0 %}
        {% set e2 = states(_ev2_power) | float(0) if _ev2_power else 0 %}
        {{ wb if wb > 0 else (e1 + e2) }}

      ev_soc_current: >
        {% if _wb_soc and states(_wb_soc) not in ['unknown','unavailable'] %}
          {{ states(_wb_soc) | float(100) }}
        {% elif _ev1_power and states(_ev1_power) | float(0) > 50 and _ev1_soc %}
          {{ states(_ev1_soc) | float(100) }}
        {% elif _ev2_power and states(_ev2_power) | float(0) > 50 and _ev2_soc %}
          {{ states(_ev2_soc) | float(100) }}
        {% else %}
          100
        {% endif %}

      ev_needs_priority: >
        {{ ev_power_total > 50 and ev_soc_current < _ev_target_soc }}

      # Solar-Prognose
      forecast_today_kwh: >
        {# Priorität 1: Externer Forecast-Sensor (Forecast.Solar, Solcast etc.) #}
        {% if _fc1 and states(_fc1) not in ['unknown','unavailable'] %}
          {% set f1 = states(_fc1) | float(0) %}
          {% set f2 = states(_fc2) | float(0) if _fc2 else 0 %}
          {% set f3 = states(_fc3) | float(0) if _fc3 else 0 %}
          {{ f1 + f2 + f3 }}

        {# Priorität 2: Sonnenscheindauer-Sensor + Anlagendaten #}
        {% elif _sun_duration and _pv_peak_kw | float(0) > 0
             and state_attr(_sun_duration, 'data') is not none %}
          {% set data = state_attr(_sun_duration, 'data') %}
          {% set eff  = _pv_efficiency | float(80) / 100.0 %}
          {% set peak = _pv_peak_kw | float(0) %}
          {% set ns   = namespace(total=0.0) %}
          {% for entry in data %}
            {% set ns.total = ns.total + (entry.value | float(0) / 3600.0 * peak * eff) %}
          {% endfor %}
          {{ ns.total | round(2) }}

        {# Priorität 3: Kein Forecast → 0 (konservativer Fallback) #}
        {% else %}
          0
        {% endif %}

      forecast_is_good:   "{{ forecast_today_kwh >= _fc_good_thresh }}"
      charge_start_hour:  "{{ _start_good if forecast_is_good else _start_poor }}"

      # Bewölkung
      cloud_cover: >
        {% if _cloud_sensor and states(_cloud_sensor) not in ['unknown','unavailable'] %}
          {{ states(_cloud_sensor) | float(0) }}
        {% elif _weather and states(_weather) not in ['unknown','unavailable'] %}
          {% set cond = state_attr(_weather, 'condition') | default('') %}
          {% if   cond in ['sunny','clear-night']            %}0
          {% elif cond in ['partlycloudy']                   %}35
          {% elif cond in ['cloudy']                         %}70
          {% elif cond in ['rainy','pouring','snowy','fog']  %}90
          {% else                                            %}50
          {% endif %}
        {% else %}
          0
        {% endif %}

      weather_factor: >
        {{ [1.0 - (cloud_cover | float(0) / 100.0 * 0.75), 0.1] | max | round(4) }}

      # ------------------------------------------------------------------
      # LADEKURVE: Konvexe S-Kurve t^a (langsamer Aufstieg, netzdienlich)
      # Aufstieg: t^a → morgens kaum laden, zum Peak voll
      # Nach Peak: konstant 1.0 → SOC-Faktor übernimmt die Drosselung
      # Aggressivität: höher = flacherer Aufstieg (Standard 3)
      #   a=2: 09:00→4%, 11:00→36%, 12:00→64%
      #   a=3: 09:00→1%, 11:00→22%, 12:00→51%
      #   a=4: 09:00→0%, 11:00→10%, 12:00→41%
      # ------------------------------------------------------------------
      curve_factor: >
        {% set h   = current_hour %}
        {% set t_s = charge_start_hour | float %}
        {% set t_p = _peak_hour | float %}
        {% set t_e = _end_hour  | float %}
        {% set a   = _aggressiveness | float(3) %}
        {% if h < t_s or h >= t_e %}
          0.0
        {% elif h <= t_p %}
          {{ (((h - t_s) / (t_p - t_s)) ** a) | round(4) }}
        {% else %}
          1.0
        {% endif %}

      # ------------------------------------------------------------------
      # SOC-Drosselung
      # ------------------------------------------------------------------
      soc_factor: >
        {% set s     = soc_current | float %}
        {% set s_max = soc_max     | float %}
        {% set s_thr = _soc_throttle | float %}
        {% if s >= s_max %}
          0.0
        {% elif s >= s_thr %}
          {{ (0.5 * (s_max - s) / [s_max - s_thr, 1] | max) | round(4) }}
        {% else %}
          1.0
        {% endif %}

      # ------------------------------------------------------------------
      # Überschuss & Ziel-Ladeleistung
      # ------------------------------------------------------------------
      ev_deduction:      "{{ ev_power_total if ev_needs_priority else 0 }}"
      available_surplus: "{{ [grid_now - ev_deduction, 0] | max }}"

      target_charge_power: >
        {% set raw     = available_surplus * curve_factor * soc_factor * weather_factor %}
        {% set limited = [raw, is_max] | min %}
        {{ 0 if limited < _min_surplus else (limited | round(0) | int) }}

      gs_value: "{{ -(target_charge_power | int) }}"

      operating_mode: >
        {% set in_charge_window = current_hour >= (charge_start_hour | float)
                               and current_hour < (_end_hour | float) %}
        {% set before_charge    = current_hour < (charge_start_hour | float) %}
        {% set has_surplus      = target_charge_power > 0 %}
        {% set soc_ok           = soc_current < soc_max %}
        {% set pv_active        = pv_now >= (_pv_start_thresh | float(100)) %}

        {% if in_charge_window and has_surplus and soc_ok %}
          active_charge
        {% elif before_charge and pv_active and soc_ok %}
          standby
        {% else %}
          pid_mode
        {% endif %}

  # ---------------------------------------------------------------------------
  # SCHRITT 2: Modus ausführen
  # ---------------------------------------------------------------------------
  - choose:

      # ════════════════════════════════════════════════════════════════════════
      # AKTIVES LADEN: MM=0, GS=negativ
      # ════════════════════════════════════════════════════════════════════════
      - conditions:
          - condition: template
            value_template: "{{ operating_mode == 'active_charge' }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input battery_mm_switch
          - service: number.set_value
            target:
              entity_id: !input battery_gs_number
            data:
              value: "{{ gs_value }}"
          - service: system_log.write
            data:
              message: >
                [SunEnergyXT] AKTIVES LADEN |
                {{ now().strftime('%H:%M') }} |
                SOC: {{ soc_current }}% / max: {{ soc_max }}% |
                Kapazität: {{ battery_capacity_kwh }}kWh ({{ battery_modules }}×5kWh) |
                Noch zu laden: {{ capacity_based_min_power }}W Ø nötig |
                PV: {{ pv_now }}W | Grid: {{ grid_now }}W |
                EV: {{ ev_power_total }}W (Prio: {{ ev_needs_priority }}) |
                Prognose: {{ forecast_today_kwh }}kWh |
                Bewölkung: {{ cloud_cover }}% (Faktor: {{ weather_factor }}) |
                Kurve: {{ curve_factor }} | SOC-Faktor: {{ soc_factor }} |
                Überschuss: {{ available_surplus }}W → GS: {{ gs_value }}W
              level: debug

      # ════════════════════════════════════════════════════════════════════════
      # STANDBY: MM=0, GS=0
      # PV produziert bereits, aber Ladezeit noch nicht erreicht.
      # Blueprint übernimmt Kontrolle (MM=0) ohne zu laden (GS=0).
      # Verhindert unkontrolliertes Laden durch den internen PID.
      # ════════════════════════════════════════════════════════════════════════
      - conditions:
          - condition: template
            value_template: "{{ operating_mode == 'standby' }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input battery_mm_switch
          - service: number.set_value
            target:
              entity_id: !input battery_gs_number
            data:
              value: 0
          - service: system_log.write
            data:
              message: >
                [SunEnergyXT] STANDBY (MM=0, GS=0) |
                {{ now().strftime('%H:%M') }} |
                SOC: {{ soc_current }}% |
                PV: {{ pv_now }}W | Grid: {{ grid_now }}W |
                Warte auf Ladezeit ({{ charge_start_hour }}:00 Uhr)
              level: warning
              logger: custom_components.sunenergyxt.blueprint

      # ════════════════════════════════════════════════════════════════════════
      # PID-MODUS: MM=1, GS=0
      # ════════════════════════════════════════════════════════════════════════
    default:
      - service: number.set_value
        target:
          entity_id: !input battery_gs_number
        data:
          value: 0
      - service: switch.turn_on
        target:
          entity_id: !input battery_mm_switch
      - service: system_log.write
        data:
          message: >
            [SunEnergyXT] PID-MODUS (MM=1, GS=0) |
            {{ now().strftime('%H:%M') }} |
            SOC: {{ soc_current }}% |
            PV: {{ pv_now }}W | Grid: {{ grid_now }}W |
            Grund: {% if current_hour < (charge_start_hour | float) and pv_now < (_pv_start_thresh | float(100)) %}vor Ladezeit (PV noch zu schwach)
            {%- elif current_hour >= (_end_hour | float) %}nach Ladezeit
            {%- elif soc_current >= soc_max %}Speicher voll
            {%- elif target_charge_power == 0 %}kein Überschuss / kein Bedarf
            {%- else %}sonstige Bedingung{% endif %}
          level: debug

mode: single
max_exceeded: silent

# =============================================================================
# Blueprint: PV-Überschussladen – SunEnergyXT 500 + Netzsensor
# =============================================================================
#
# INSTALLATION:
#   1. Diese Datei nach config/blueprints/automation/ kopieren
#      (Ordner ggf. anlegen)
#   2. HA neu starten oder Blueprints neu laden
#   3. Einstellungen → Automationen → Automation erstellen →
#      "Aus Blueprint erstellen" → dieses Blueprint wählen
#
# =============================================================================

blueprint:
  name: "PV-Überschussladen – SunEnergyXT 500"
  description: >
    Regelt die Ladeleistung eines SunEnergyXT 500 Batteriespeichers anhand
    eines Netzsensors (z.B. Tuya PJ-1203A).

    **Vorzeichenkonvention Netzsensor:** positiv = Einspeisung, negativ = Bezug.

    **Hysterese:** Einschalten ab `schwelle_ein`, Ausschalten unter `schwelle_aus`.

    **Schonladen:** Nur ein konfigurierbarer Prozentsatz des Überschusses wird
    als Ladeleistung angesetzt (Standard 50 %). Beide Modelle laden bis 2400 W;
    die Einspeise-/Entladeleistung ist beim 500 auf 800 W, beim 500 Pro auf 2400 W begrenzt.

    **Ziel-Einspeisung:** Der Speicher entlädt so viel, dass immer ein
    konfigurierbarer Mindestwert ins Netz eingespeist wird (Standard 80 W).
    Beim PV-Laden hat der Überschuss Vorrang.

    **Gedämpfte Schrittregelung:** Bei kleinem Fehler werden nur kleine Schritte
    gesetzt, bei großem Fehler größere – verhindert Schwingen. Nach jedem
    Schreibvorgang wird gewartet bis ein neuer Messwert vorliegt.

    Trigger alle 10 Sekunden (= typische Updaterate Tuya PJ-1203A).
  domain: automation
  author: "pLazyN"
  homeassistant:
    min_version: "2024.6.0"

  input:

    # ── Netzmessung ───────────────────────────────────────────────────────────
    section_netz:
      name: "🔌 Netzmessung"
      icon: mdi:transmission-tower
      collapsed: false
      input:

        netz_sensor:
          name: "Netzsensor (Leistung in W)"
          description: >
            Sensor, der den aktuellen Netzaustausch in Watt liefert.
            **Positiv = Einspeisung, negativ = Bezug.**
            (Tuya PJ-1203A oder ähnlich)
          selector:
            entity:
              domain: sensor
              device_class: power

    # ── SunEnergyXT Speicher ──────────────────────────────────────────────────
    section_speicher:
      name: "🔋 Speicher (SunEnergyXT 500)"
      icon: mdi:battery-charging
      collapsed: false
      input:

        speicher_gs:
          name: "GS – Sollwert Netzanschluss (number)"
          description: >
            Steuert die Lade-/Entladeleistung. **Negativ = Laden, Positiv = Einspeisen.**
            API-Feld: GS. (z.B. number.SunEnergyXT500_gs)
          selector:
            entity:
              domain: number

        speicher_soc:
          name: "SC – Ladestand SOC (sensor)"
          description: >
            Aktueller Speicherladestand in Prozent.
            API-Feld: SC. (z.B. sensor.SunEnergyXT500_sc)
          selector:
            entity:
              domain: sensor
              device_class: battery

        speicher_pb:
          name: "PB – Aktuelle Batterieleistung (sensor)"
          description: >
            Aktuelle Lade-/Entladeleistung des Speichers in Watt.
            API-Feld: PB. (z.B. sensor.SunEnergyXT500_pb)
          selector:
            entity:
              domain: sensor
              device_class: power

    # ── Schwellwerte & Regelparameter ─────────────────────────────────────────
    section_schwellen:
      name: "⚙️ Schwellwerte & Regelparameter"
      icon: mdi:tune
      collapsed: false
      input:

        schwelle_ein:
          name: "Einschaltschwelle Laden (W)"
          description: >
            Mindesteinspeisung ins Netz, ab der der Ladevorgang startet.
            Empfehlung: 150–300 W.
          default: 200
          selector:
            number:
              min: 50
              max: 2000
              step: 10
              unit_of_measurement: W
              mode: slider

        schwelle_aus:
          name: "Ausschaltschwelle Laden (W)"
          description: >
            Fällt die Einspeisung unter diesen Wert, wird das Laden gestoppt.
            Sollte kleiner als die Einschaltschwelle sein (Hysterese).
          default: 150
          selector:
            number:
              min: 0
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: slider

        ziel_einspeisung:
          name: "Ziel-Einspeisung (W)"
          description: >
            Angestrebter Netzwert in Watt. Der Speicher entlädt so viel, dass
            dieser Wert am Netzanschluss gehalten wird.
            0 W = Nulleinspeisung, 50–100 W = leichte Dauereinspeisung empfohlen.
            Beim Laden hat PV-Überschuss Vorrang.
          default: 80
          selector:
            number:
              min: -200
              max: 500
              step: 10
              unit_of_measurement: W
              mode: slider

        max_ladeleistung:
          name: "Maximale Ladeleistung (W)"
          description: >
            Maximale Ladeleistung des Speichers. Beide Modelle (500 und 500 Pro)
            unterstützen bis zu 2400 W beim Laden.
            Tipp: niedrigeren Wert für schonendes Laden eintragen (z.B. 1200 W).
          default: 2400
          selector:
            number:
              min: 100
              max: 2400
              step: 10
              unit_of_measurement: W
              mode: slider

        drosselung_pct:
          name: "Schonlade-Drosselung (%)"
          description: >
            Anteil des verfügbaren Überschusses, der als Ladeleistung
            angesetzt wird. 50 % = schonend, 100 % = voller Überschuss.
          default: 50
          selector:
            number:
              min: 10
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

    # ── Dämpfungs- und Schrittparameter ──────────────────────────────────────
    section_daempfung:
      name: "🎚️ Dämpfung & Schrittregelung"
      icon: mdi:sine-wave
      collapsed: true
      input:

        fehler_klein:
          name: "Schwelle kleiner Fehler (W)"
          description: >
            Abweichungen unter diesem Wert gelten als klein → kleinster Schritt.
            Empfehlung: 30–50 W.
          default: 40
          selector:
            number:
              min: 10
              max: 200
              step: 10
              unit_of_measurement: W
              mode: slider

        fehler_gross:
          name: "Schwelle großer Fehler (W)"
          description: >
            Abweichungen über diesem Wert gelten als groß → größter Schritt.
            Empfehlung: 150–300 W.
          default: 200
          selector:
            number:
              min: 50
              max: 1000
              step: 50
              unit_of_measurement: W
              mode: slider

        schritt_klein:
          name: "Schrittgröße klein (W)"
          description: >
            Maximale GS-Änderung pro Zyklus bei kleinem Fehler.
            Klein = sanft, verhindert Schwingen. Empfehlung: 15–30 W.
          default: 20
          selector:
            number:
              min: 5
              max: 100
              step: 5
              unit_of_measurement: W
              mode: slider

        schritt_mittel:
          name: "Schrittgröße mittel (W)"
          description: >
            Maximale GS-Änderung pro Zyklus bei mittlerem Fehler.
            Empfehlung: 80–150 W.
          default: 100
          selector:
            number:
              min: 20
              max: 500
              step: 10
              unit_of_measurement: W
              mode: slider

        schritt_gross:
          name: "Schrittgröße groß (W)"
          description: >
            Maximale GS-Änderung pro Zyklus bei großem Fehler.
            Schnelle Reaktion auf größere Lastsprünge. Empfehlung: 300–500 W.
          default: 400
          selector:
            number:
              min: 100
              max: 2400
              step: 50
              unit_of_measurement: W
              mode: slider

        einschwingzeit:
          name: "Einschwingzeit (s)"
          description: >
            Mindestwartezeit nach einem Schreibvorgang bevor neu geregelt wird.
            Gibt dem Speicher Zeit zu reagieren und verhindert zu schnelle
            Folgekorrekturen. Empfehlung: 5–10 s.
          default: 7
          selector:
            number:
              min: 2
              max: 30
              step: 1
              unit_of_measurement: s
              mode: slider

# =============================================================================
# AUTOMATION
# =============================================================================
trigger:
  - platform: time_pattern
    seconds: "/10"

variables:
  # ── Blueprint-Inputs per !input auflösen ────────────────────────────────────
  netz_sensor_id:      !input netz_sensor
  speicher_gs_id:      !input speicher_gs
  speicher_soc_id:     !input speicher_soc
  schwelle_ein_val:    !input schwelle_ein
  schwelle_aus_val:    !input schwelle_aus
  ziel_val:            !input ziel_einspeisung
  max_laden_val:       !input max_ladeleistung
  drosselung_pct_val:  !input drosselung_pct
  fehler_klein_val:    !input fehler_klein
  fehler_gross_val:    !input fehler_gross
  schritt_klein_val:   !input schritt_klein
  schritt_mittel_val:  !input schritt_mittel
  schritt_gross_val:   !input schritt_gross
  einschwingzeit_val:  !input einschwingzeit

  # ── Messwerte ────────────────────────────────────────────────────────────────
  netz:        "{{ states(netz_sensor_id)  | float(0) }}"
  soc:         "{{ states(speicher_soc_id) | float(0) }}"
  gs_aktuell:  "{{ states(speicher_gs_id)  | float(0) }}"
  drosselung:  "{{ drosselung_pct_val / 100 }}"
  laden_aktiv: "{{ gs_aktuell < 0 }}"
  schwelle:    "{{ schwelle_aus_val if laden_aktiv else schwelle_ein_val }}"

  # ── Einschwingzeit-Prüfung ───────────────────────────────────────────────────
  # Sekunden seit dem letzten GS-Schreibvorgang (last_changed des GS-Sensors)
  sekunden_seit_gs_aenderung: >
    {{ (as_timestamp(now()) - as_timestamp(states[speicher_gs_id].last_changed, 0)) | round(1) }}
  # Sekunden seit dem letzten Netzsensor-Update
  sekunden_seit_netz_update: >
    {{ (as_timestamp(now()) - as_timestamp(states[netz_sensor_id].last_updated, 0)) | round(1) }}
  # Freigabe: nur wenn GS lange genug unverändert UND neuer Messwert vorliegt
  # (neuer Messwert = Netzsensor wurde nach letzter GS-Änderung aktualisiert)
  regelung_freigegeben: >
    {{ sekunden_seit_gs_aenderung >= einschwingzeit_val
       and as_timestamp(states[netz_sensor_id].last_updated, 0)
           > as_timestamp(states[speicher_gs_id].last_changed, 0) }}

  # ── Sollwerte (Vollkorrektur) ────────────────────────────────────────────────
  soll_laden: >
    {% if netz > schwelle %}
      {{ [((netz * drosselung) | round(0) | int), max_laden_val] | min }}
    {% else %}
      0
    {% endif %}
  soll_einspeisen: >
    {{ ([0, (ziel_val - netz + gs_aktuell)] | max) | round(0) | int }}

  # ── Fehler und gedämpfte Schrittgröße ────────────────────────────────────────
  # Fehler = Differenz zwischen Vollkorrektur-Sollwert und aktuellem GS
  # Vorzeichen: positiv = GS muss erhöht werden, negativ = GS muss gesenkt werden
  gs_fehler: >
    {% if soll_laden > 0 %}
      {{ (soll_laden * -1) - gs_aktuell }}
    {% elif soll_einspeisen > 0 %}
      {{ soll_einspeisen - gs_aktuell }}
    {% else %}
      {{ 0 - gs_aktuell }}
    {% endif %}
  fehler_betrag: "{{ gs_fehler | abs | round(0) | int }}"

  # Schrittgröße je nach Fehlerbetrag (klein / mittel / groß)
  max_schritt: >
    {% if fehler_betrag >= fehler_gross_val %}
      {{ schritt_gross_val }}
    {% elif fehler_betrag >= fehler_klein_val %}
      {{ schritt_mittel_val }}
    {% else %}
      {{ schritt_klein_val }}
    {% endif %}

  # Begrenzter Schritt: Vorzeichen des Fehlers × min(|Fehler|, max_schritt)
  begrenzter_schritt: >
    {% if gs_fehler > 0 %}
      {{ [gs_fehler, max_schritt] | min | round(0) | int }}
    {% else %}
      {{ ([gs_fehler, max_schritt * -1] | max) | round(0) | int }}
    {% endif %}

  # Nächster GS-Wert = aktueller GS + begrenzter Schritt
  naechster_gs: "{{ (gs_aktuell + begrenzter_schritt) | round(0) | int }}"

condition:
  - condition: template
    value_template: >
      {{ states(netz_sensor_id) not in ['unavailable', 'unknown', 'none'] }}

action:
  - choose:

      # ── FALL 1: Ladevorgang sofort STOPPEN (keine Einschwingzeit) ─────────────
      # Wenn Einspeisung unter Ausschaltschwelle → GS sofort auf 0
      # (Sicherheitsfall – keine Verzögerung durch Einschwingzeit)
      - conditions:
          - condition: template
            value_template: "{{ netz < schwelle_aus_val and laden_aktiv }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input speicher_gs
            data:
              value: "0"
          - action: logbook.log
            data:
              name: "PV Überschussladen"
              message: >
                Laden gestoppt – Einspeisung {{ netz | round(0) }} W
                unter Ausschaltschwelle {{ schwelle_aus_val }} W (SOC {{ soc }}%)

      # ── FALL 2–3: Schrittregelung (mit Einschwingzeit) ───────────────────────
      # Nur wenn Einschwingzeit abgelaufen UND neuer Messwert vorliegt
      # UND Fehler groß genug (mind. schritt_klein_val)
      - conditions:
          - condition: template
            value_template: >
              {{ regelung_freigegeben
                 and fehler_betrag >= fehler_klein_val }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input speicher_gs
            data:
              value: "{{ naechster_gs }}"
          - action: logbook.log
            data:
              name: "PV Überschussladen"
              message: >
                GS {{ gs_aktuell | round(0) }} → {{ naechster_gs }} W
                (Fehler {{ gs_fehler | round(0) }} W, Schritt {{ begrenzter_schritt }} W,
                Netz {{ netz | round(0) }} W, SOC {{ soc }}%,
                seit GS-Änderung {{ sekunden_seit_gs_aenderung }} s)

      # ── FALL 4: Kein Handlungsbedarf ─────────────────────────────────────────
      # Fehler < schritt_klein_val, oder Einschwingzeit noch nicht abgelaufen

mode: single
max_exceeded: silent
